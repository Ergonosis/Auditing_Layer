steps:
  # Copy unification repo from submitted source (uploaded alongside auditing repo)
  - name: 'bash'
    args:
      - -c
      - cp -r ergonosis_unification_src ergonosis_unification

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, 'us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, 'us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - ergonosis-auditing-pipeline
      - --region=us-central1
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:$SHORT_SHA
      - --service-account=ergonosis-pipeline-sa@ergonosis.iam.gserviceaccount.com
      - --task-timeout=5400
      - --max-retries=1
      - --set-env-vars=ENVIRONMENT=production,STATE_BACKEND=databricks,DATABRICKS_CATALOG=ergonosis,DATABRICKS_SCHEMA=unification,DATABRICKS_AUDIT_SCHEMA=auditing,UNIFICATION_SECURE_STORAGE_REQUIRED=true,LOG_LEVEL=INFO,GCP_PROJECT_ID=ergonosis

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:$SHORT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:latest

options:
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE
