steps:
  # Clone unification repo into build context so Dockerfile can COPY it
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        git clone --depth=1 \
          https://github.com/dylancc5/Data-Unification-Layer \
          ergonosis_unification

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:$SHORT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, 'us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:$SHORT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, 'us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - ergonosis-auditing-pipeline
      - --region=us-central1
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:$SHORT_SHA
      - --update-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
      - --update-secrets=DATABRICKS_HOST=DATABRICKS_HOST:latest
      - --update-secrets=DATABRICKS_TOKEN=DATABRICKS_TOKEN:latest
      - --update-secrets=DATABRICKS_HTTP_PATH=DATABRICKS_HTTP_PATH:latest
      - --update-secrets=UNIFICATION_USER_EMAIL=UNIFICATION_USER_EMAIL:latest
      - --set-env-vars=ENVIRONMENT=production,STATE_BACKEND=memory,DATABRICKS_CATALOG=ergonosis,DATABRICKS_SCHEMA=unification,UNIFICATION_SECURE_STORAGE_REQUIRED=true,LOG_LEVEL=INFO,GCP_PROJECT_ID=ergonosis

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:$SHORT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/ergonosis-auditing/pipeline:latest

options:
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE
